<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a; --card: #0f121a; --card-hover: #161b26;
            --accent: #4a9fff; --accent-dim: rgba(74, 159, 255, 0.1);
            --text: #e8eaf0; --text-muted: #888ea8; --border: rgba(255,255,255,0.08);
            --warning: #ffb340; --danger: #ff6b6b; --success: #00e887;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; padding: 30px; line-height: 1.6; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .logo-title { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
        .logo-title span { color: var(--accent); }
        .search-bar { width: 450px; padding: 15px 25px; background: var(--card); border: 1px solid var(--border); border-radius: 100px; color: #fff; font-size: 15px; outline: none; transition: 0.3s; }
        .search-bar:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(74,159,255,0.15); }

        /* Dashboard Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(600px, 1fr)); gap: 30px; }
        
        /* Card Structure */
        .p-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 35px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; display: flex; flex-direction: column; }
        .p-card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.4); background: var(--card-hover); }
        
        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .country-badge { background: var(--accent-dim); color: var(--accent); padding: 5px 15px; border-radius: 100px; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .partner-name { font-size: 32px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
        .ceo-tag { font-size: 14px; color: var(--text-muted); margin-top: 4px; font-weight: 400; }

        /* Content Sections */
        .section { margin-bottom: 25px; }
        .section-header { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .section-header::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        
        .main-info { font-size: 15px; color: var(--text); margin-bottom: 15px; }
        .sub-info { font-size: 14px; color: var(--text-muted); text-align: justify; }

        /* Charts */
        .chart-box { background: #05070a; border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-top: 10px; }
        .chart-title { font-size: 10px; color: var(--success); margin-bottom: 8px; font-weight: 700; opacity: 0.8; }
        .bar-chart { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--success); line-height: 1.5; white-space: pre; }

        /* Highlights & Admin */
        .highlight { background: rgba(255, 179, 64, 0.07); border-left: 4px solid var(--warning); padding: 15px; border-radius: 4px; margin: 10px 0; font-size: 14px; }
        .contract-box { background: rgba(232, 234, 240, 0.03); border-radius: 12px; padding: 20px; margin-top: 10px; border: 1px solid var(--border); }
        .admin-critical { background: linear-gradient(135deg, rgba(74, 159, 255, 0.1), transparent); border: 1px dashed var(--accent); padding: 20px; border-radius: 16px; margin-top: auto; }
        .admin-critical strong { color: var(--accent); font-size: 13px; display: block; margin-bottom: 8px; text-transform: uppercase; }

        .lineup { font-size: 12px; color: var(--accent); font-weight: 600; margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border); }

        @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } .search-bar { width: 100%; } }
    </style>
</head>
