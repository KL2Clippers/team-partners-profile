    <style>
        :root {
            --bg: #05070a; --card: #0f121a; --card-hover: #161b26;
            --accent: #4a9fff; --accent-dim: rgba(74, 159, 255, 0.1);
            --text: #e8eaf0; --text-muted: #888ea8; --border: rgba(255,255,255,0.08);
            --warning: #ffb340; --danger: #ff6b6b; --success: #00e887;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; padding: 30px; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; flex-shrink: 0; }
        .logo-title { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
        .logo-title span { color: var(--accent); }
        .search-bar { width: 350px; padding: 12px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 100px; color: #fff; font-size: 14px; outline: none; transition: 0.3s; }
        .search-bar:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(74,159,255,0.1); }

        .grid { display: grid; grid-template-columns: 1fr; gap: 40px; flex-grow: 1; }
        
        .p-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 35px; position: relative; display: flex; flex-direction: column; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; }
        .country-badge { background: var(--accent-dim); color: var(--accent); padding: 5px 15px; border-radius: 100px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .partner-name { font-size: 34px; font-weight: 800; color: #fff; letter-spacing: -0.5px; margin-top: 5px; }
        .ceo-tag { font-size: 14px; color: var(--text-muted); margin-top: 4px; font-family: 'DM Mono'; }

        .info-section { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        .section-header { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .section-header::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        
        .desc-text { font-size: 14px; color: var(--text-muted); text-align: justify; margin-bottom: 15px; }
        .main-point { font-size: 15px; color: var(--text); font-weight: 600; margin-bottom: 10px; }

        .chart-box { background: #05070a; border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 15px; }
        .chart-title { font-size: 10px; color: var(--success); font-weight: 800; margin-bottom: 10px; text-transform: uppercase; opacity: 0.7; }
        .bar-chart { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--success); white-space: pre; line-height: 1.4; }

        .highlight-danger { background: rgba(255, 107, 107, 0.08); border-left: 4px solid var(--danger); padding: 18px; border-radius: 8px; margin: 15px 0; font-size: 14px; color: #fff; }
        .contract-info { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px; border: 1px solid var(--border); font-size: 13px; color: var(--text-muted); }

        .admin-box { background: linear-gradient(135deg, rgba(74, 159, 255, 0.12), transparent); border: 1.5px dashed var(--accent); padding: 25px; border-radius: 20px; margin-top: auto; }
        .admin-box strong { color: var(--accent); font-size: 13px; display: block; margin-bottom: 10px; text-transform: uppercase; }

        /* Pagination Controls */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 40px; padding-bottom: 40px; }
        .page-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 18px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .page-btn:hover { border-color: var(--accent); color: var(--accent); }
        .page-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .page-info { font-size: 14px; color: var(--text-muted); margin: 0 15px; }

        @media (max-width: 1100px) { .info-section { grid-template-columns: 1fr; } }
    </style>

        function renderPagination() {
            const container = document.getElementById('pagination');
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            
            let html = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="render(${currentPage - 1})">Prev</button>`;
            
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="render(${i})">${i}</button>`;
            }
            
            html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="render(${currentPage + 1})">Next</button>`;
            html += `<span class="page-info">Page ${currentPage} of ${totalPages}</span>`;
            
            container.innerHTML = html;
        }
