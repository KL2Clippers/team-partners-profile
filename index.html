<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL OPS — Intelligence Center (Edit Mode)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a; --card: #0f121a; --card-hover: #161b26;
            --accent: #4a9fff; --accent-dim: rgba(74, 159, 255, 0.1);
            --text: #e8eaf0; --text-muted: #888ea8; --border: rgba(255,255,255,0.08);
            --warning: #ffb340; --danger: #ff6b6b; --success: #00e887;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; padding: 30px; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Header & Admin Controls */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; flex-wrap: wrap; gap: 20px; }
        .logo-title { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
        .logo-title span { color: var(--accent); }
        
        .admin-controls { display: flex; gap: 10px; align-items: center; }
        .search-bar { width: 300px; padding: 10px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 100px; color: #fff; font-size: 14px; outline: none; }
        
        .btn { padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; border: 1px solid var(--border); transition: 0.3s; font-size: 13px; display: flex; align-items: center; gap: 6px; }
        .btn-config { background: #1a1f2e; color: #fff; }
        .btn-edit { background: var(--accent); color: #000; }
        .btn-save { background: var(--success); color: #000; display: none; }

        /* Dashboard Grid */
        .grid { display: grid; grid-template-columns: 1fr; gap: 40px; flex-grow: 1; }
        .p-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 35px; position: relative; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Card Content */
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .country-badge { background: var(--accent-dim); color: var(--accent); padding: 5px 15px; border-radius: 100px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .partner-name { font-size: 34px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
        
        .info-section { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 25px; }
        .section-header { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .section-header::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        /* Edit Mode Styles */
        [contenteditable="true"] { border: 1px dashed var(--accent) !important; background: rgba(74,159,255,0.05); padding: 5px; border-radius: 4px; outline: none; }

        .chart-box { background: #000; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; font-family: 'DM Mono', monospace; color: var(--success); font-size: 12px; white-space: pre; }
        .highlight-danger { background: rgba(255, 107, 107, 0.08); border-left: 4px solid var(--danger); padding: 18px; border-radius: 8px; margin: 15px 0; font-size: 14px; }
        .admin-box { background: linear-gradient(135deg, rgba(74, 159, 255, 0.12), transparent); border: 1.5px dashed var(--accent); padding: 25px; border-radius: 20px; margin-top: 20px; }

        /* Pagination */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 40px; padding-bottom: 40px; }
        .page-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .page-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        /* Config Modal */
        #configModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 20px; width: 450px; border: 1px solid var(--accent); }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; }

        @media (max-width: 1000px) { .info-section { grid-template-columns: 1fr; } .search-bar { width: 100%; } }
    </style>
</head>

        let currentPage = 1;
        const itemsPerPage = 3;
        let isEditMode = false;
        let filteredData = [...partners];

        function render(page = 1) {
            currentPage = page;
            const grid = document.getElementById('partnerGrid');
            const startIndex = (page - 1) * itemsPerPage;
            const pageData = filteredData.slice(startIndex, startIndex + itemsPerPage);

            grid.innerHTML = pageData.map((p, i) => {
                const globalIdx = startIndex + i;
                return `
                <div class="p-card" data-idx="${globalIdx}">
                    <div class="card-top">
                        <div>
                            <span class="country-badge" contenteditable="${isEditMode}">${p.국가}</span>

        async function saveToGithub() {
            const token = localStorage.getItem('gh_token');
            const repo = localStorage.getItem('gh_repo');
            if(!token || !repo) { alert("🔒 Settings에서 GitHub 토큰을 먼저 설정하세요."); toggleModal(); return; }

            // 현재 화면의 데이터를 partners 배열에 수집
            document.querySelectorAll('.p-card').forEach(card => {
                const idx = card.dataset.idx;
                const p = partners[idx];
                p.국가 = card.querySelector('.country-badge').innerText;
                p.업체명 = card.querySelector('.partner-name').innerText;
                p.CEO = card.querySelector('.ceo-tag span') ? card.querySelector('.ceo-tag span').innerText : p.CEO;
                p.매출분석 = card.querySelector('.main-point').innerText;
                p.매출그래프 = card.querySelectorAll('.chart-box')[0].innerText;
                p.판매량그래프 = card.querySelectorAll('.chart-box')[1].innerText;
                p.운영현황 = card.querySelector('.desc-text').innerText;
                p.계약정보 = card.querySelector('.contract-info').innerText;
                p.이슈 = card.querySelector('.highlight-danger span').innerText;
                p.관리포인트 = card.querySelector('.admin-box div').innerText;
                p.주력제품 = card.querySelector('.lineup-footer span') ? card.querySelector('.lineup-footer span').innerText : card.lastElementChild.innerText.replace('📦 LINEUP: ', '');
            });

            if(!confirm("GitHub 저장소에 직접 저장하시겠습니까? 사이트 반영까지 약 1~2분이 소요됩니다.")) return;
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.innerText = "⌛ Saving..."; saveBtn.disabled = true;

            try {
                const url = `https://api.github.com/repos/${repo}/contents/index.html`;
                const getFile = await fetch(url, { headers: { Authorization: `token ${token}` } });
                const fileData = await getFile.json();
                
                const currentContent = decodeURIComponent(escape(atob(fileData.content)));
                const dataPattern = /let partners = \[[\s\S]*?\];/;
                const newContent = currentContent.replace(dataPattern, `let partners = ${JSON.stringify(partners, null, 12)};`);

                const putFile = await fetch(url, {
                    method: 'PUT',
                    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "Update Intelligence Data via Dashboard",
                        content: btoa(unescape(encodeURIComponent(newContent))),
                        sha: fileData.sha
                    })
                });

                if(putFile.ok) { alert("✅ 저장 완료! 잠시 후 사이트가 업데이트됩니다."); location.reload(); }
                else throw new Error("API Error");
            } catch(e) { alert("❌ 저장 실패: " + e.message); }
            finally { saveBtn.innerText = "💾 Save to GitHub"; saveBtn.disabled = false; }
        }

        function renderPagination() {
            const container = document.getElementById('pagination');
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            let html = "";
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="render(${i})">${i}</button>`;
            }
            container.innerHTML = html;
        }

        document.getElementById('searchInput').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            filteredData = partners.filter(p => p.업체명.toLowerCase().includes(val) || p.국가.toLowerCase().includes(val) || p.이슈.toLowerCase().includes(val));
            render(1);
        };

        function toggleModal() {
            const m = document.getElementById('configModal');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
            document.getElementById('ghToken').value = localStorage.getItem('gh_token') || "";
            document.getElementById('ghRepo').value = localStorage.getItem('gh_repo') || "";
        }

        function saveConfig() {
            localStorage.setItem('gh_token', document.getElementById('ghToken').value);
            localStorage.setItem('gh_repo', document.getElementById('ghRepo').value);
            alert("Settings Saved!"); toggleModal();
        }

        render(1);
    </script>
