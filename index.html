            --warning: #ffb340; --danger: #ff6b6b; --success: #00e887;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; padding: 30px; line-height: 1.6; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .search-bar { width: 400px; padding: 15px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: #fff; font-size: 15px; outline: none; transition: 0.3s; }
        .search-bar:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(74,159,255,0.2); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); gap: 25px; }
        .p-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; transition: 0.3s; position: relative; }
        .p-card:hover { transform: translateY(-8px); border-color: var(--accent); background: var(--card-hover); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .country-tag { background: var(--accent-dim); color: var(--accent); padding: 4px 12px; border-radius: 100px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .partner-name { font-size: 24px; font-weight: 700; margin-top: 10px; color: #fff; }
        .section-title { font-size: 12px; color: var(--accent); font-weight: 700; margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        .content-text { font-size: 14px; color: var(--text-muted); margin-bottom: 10px; text-align: justify; }
        .chart-area { font-family: 'DM Mono', monospace; background: #080a0f; padding: 15px; border-radius: 10px; font-size: 12px; color: var(--success); overflow-x: auto; margin-top: 10px; border: 1px solid rgba(0,232,135,0.1); white-space: pre; }
        .highlight-box { background: rgba(255, 179, 64, 0.05); border-left: 3px solid var(--warning); padding: 15px; border-radius: 4px; margin: 15px 0; font-size: 14px; color: #fff; }
        .admin-focus { background: rgba(74, 159, 255, 0.08); border: 1px dashed var(--accent); padding: 20px; border-radius: 12px; margin-top: 25px; }
        .admin-focus strong { color: var(--accent); display: block; margin-bottom: 8px; font-size: 13px; text-transform: uppercase; }
        .meta-info { margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); font-size: 12px; color: var(--accent); font-weight: 600; }

        function render(filter = "") {
            const grid = document.getElementById('partnerGrid');
            const filtered = partners.filter(p => 
                p.업체명.toLowerCase().includes(filter.toLowerCase()) || 
                p.국가.toLowerCase().includes(filter.toLowerCase()) ||
                p.주요이슈.toLowerCase().includes(filter.toLowerCase())
            );

            grid.innerHTML = filtered.map(p => `
                <div class="p-card">
                    <div class="card-header">
                        <span class="country-tag">${p.국가}</span>
                        <div class="partner-name">${p.업체명}</div>
                    </div>

                    <div class="section-title">📊 SALES INSIGHT [NotebookLM]</div>
                    <div class="content-text">${p.매출추이}</div>
                    <div class="chart-area">${p.매출그래프}</div>

                    <div class="section-title">🕒 CURRENT OPS & ISSUE</div>
                    <div class="content-text">${p.현재상태}</div>
                    <div class="highlight-box">${p.주요이슈}</div>

                    <div class="admin-focus">
                        <strong>🛡️ Admin Critical Focus</strong>
                        <div class="content-text" style="color: #fff; font-size: 13px;">${p.관리포인트}</div>
                    </div>

                    <div class="meta-info">
                        📦 MAIN LINEUP: ${p.주력제품}
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('searchInput').oninput = (e) => render(e.target.value);
        render();
    </script>
