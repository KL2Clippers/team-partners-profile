    <style>
        :root {
            --bg: #05070a; --card: #0f121a; --card-hover: #161b26;

            --warning: #ffb340; --danger: #ff6b6b; --success: #00e887;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; padding: 30px; line-height: 1.6; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .logo-title { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
        .logo-title span { color: var(--accent); }
        .search-bar { width: 450px; padding: 15px 25px; background: var(--card); border: 1px solid var(--border); border-radius: 100px; color: #fff; font-size: 15px; outline: none; transition: 0.3s; }
        .search-bar:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(74,159,255,0.15); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(650px, 1fr)); gap: 30px; }
        .p-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 35px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .p-card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.5); background: var(--card-hover); }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; }
        .country-badge { background: var(--accent-dim); color: var(--accent); padding: 5px 15px; border-radius: 100px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .partner-name { font-size: 34px; font-weight: 800; color: #fff; letter-spacing: -0.5px; margin-top: 5px; }
        .ceo-tag { font-size: 14px; color: var(--text-muted); margin-top: 4px; font-family: 'DM Mono'; }
        .info-section { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 30px; }
        .section-header { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .section-header::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        .desc-text { font-size: 14px; color: var(--text-muted); text-align: justify; margin-bottom: 15px; }
        .main-point { font-size: 15px; color: var(--text); font-weight: 600; margin-bottom: 10px; }
        .chart-box { background: #05070a; border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 15px; }
        .chart-title { font-size: 10px; color: var(--success); font-weight: 800; margin-bottom: 10px; text-transform: uppercase; opacity: 0.7; }
        .bar-chart { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--success); white-space: pre; line-height: 1.4; }
        .highlight-warning { background: rgba(255, 179, 64, 0.08); border-left: 4px solid var(--warning); padding: 18px; border-radius: 8px; margin: 15px 0; font-size: 14px; color: #fff; }
        .contract-info { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px; border: 1px solid var(--border); font-size: 13px; color: var(--text-muted); }
        .admin-box { background: linear-gradient(135deg, rgba(74, 159, 255, 0.15), transparent); border: 1.5px dashed var(--accent); padding: 25px; border-radius: 20px; margin-top: auto; }
        .admin-box strong { color: var(--accent); font-size: 13px; display: block; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .lineup-footer { font-size: 12px; color: var(--accent); font-weight: 700; margin-top: 25px; padding-top: 15px; border-top: 1px solid var(--border); }
        @media (max-width: 1200px) { .grid { grid-template-columns: 1fr; } .info-section { grid-template-columns: 1fr; } }
    </style>
</head>

                    <div class="card-top">
                        <div>
